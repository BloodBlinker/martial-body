# Static analysis config for Martial Body.
#
# Tighter than the flutter_lints defaults — strict type flags catch implicit
# dynamic before it produces a null-pointer in release builds.
include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    # Safety / correctness — catch real bugs.
    avoid_print: true
    unawaited_futures: true
    use_build_context_synchronously: true
    avoid_returning_null_for_void: true
    use_key_in_widget_constructors: true
    avoid_unnecessary_containers: true
    # Style — consistent with what the codebase already does.
    prefer_single_quotes: true
    # Explicitly OFF (too noisy in existing seed files; not a correctness
    # concern and chasing them before the 24-week test run risks churn).
    prefer_const_constructors: false
    prefer_const_declarations: false
    prefer_final_locals: false
