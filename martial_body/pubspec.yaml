name: martial_body
description: 24-week MMA preparation program — fully offline.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # Navigation
  go_router: ^14.6.2
  # State management
  flutter_riverpod: ^2.6.1
  # Charts
  fl_chart: ^0.68.0
  # Database
  drift: ^2.22.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0
  # Launch YouTube-search URLs from the active session for exercise demos,
  # and open the hosted privacy policy from Profile.
  url_launcher: ^6.3.1
  # Share the user's exported CSV from the Profile tab.
  share_plus: ^10.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.22.0
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#28292C"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21
